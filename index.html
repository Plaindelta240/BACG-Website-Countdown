<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.A.C.G. — NATO vs Russia — Server Goes Live</title>
<meta name="description" content="British Army Combat Group — NATO vs Russia PvP Conflict server goes live Friday 24th July, 5:00 PM BST.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #08070c;
    --bg-2: #0d0a10;
    --maroon: #5e141c;
    --maroon-light: #7a1d27;
    --red: #d83c3c;
    --tan: #a89680;
    --tan-dim: #786a5a;
    --white: #eeece6;
    --hairline: rgba(168,150,128,0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background:
      radial-gradient(ellipse 700px 500px at 50% 18%, rgba(94,20,28,0.35), transparent 60%),
      radial-gradient(ellipse 900px 700px at 50% 100%, rgba(94,20,28,0.25), transparent 65%),
      var(--bg);
  }

  .poster {
    width: 100%;
    max-width: 640px;
    padding: 0 0 56px;
    position: relative;
  }

  .rule-top, .rule-bottom {
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--maroon-light) 15%, var(--maroon-light) 85%, transparent);
  }

  .rule-bottom { margin-top: 40px; }

  header {
    text-align: center;
    padding: 44px 20px 8px;
  }

  .eyebrow-title {
    font-size: clamp(16px, 5vw, 30px);
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--tan);
    margin: 0 0 14px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  @media (max-width: 360px) {
    .eyebrow-title { letter-spacing: 0.1em; }
  }

  .eyebrow-underline {
    width: 120px;
    height: 2px;
    background: var(--tan-dim);
    margin: 0 auto;
  }

  .badge-wrap {
    display: flex;
    justify-content: center;
    padding: 32px 0 12px;
  }

  .badge-wrap img {
    width: min(46vw, 300px);
    height: auto;
    filter: drop-shadow(0 0 40px rgba(94,20,28,0.55));
  }

  .headline {
    text-align: center;
    padding: 8px 20px 0;
  }

  .tag {
    font-size: 18px;
    letter-spacing: 0.35em;
    color: var(--tan);
    font-weight: 500;
    text-transform: uppercase;
    margin: 0 0 6px;
  }

  .conflict {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: clamp(46px, 11vw, 74px);
    letter-spacing: 0.06em;
    color: var(--white);
    margin: 0;
    line-height: 1;
    text-shadow: 0 2px 18px rgba(0,0,0,0.6);
  }

  .matchup {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: clamp(36px, 9.5vw, 62px);
    letter-spacing: 0.04em;
    color: var(--red);
    margin: 4px 0 0;
    line-height: 1;
    text-shadow: 0 2px 22px rgba(216,60,60,0.25);
  }

  .matchup .vs {
    color: var(--tan);
    font-size: 0.6em;
    vertical-align: middle;
    margin: 0 6px;
  }

  .sub-tag {
    font-size: 15px;
    letter-spacing: 0.4em;
    color: var(--tan);
    text-transform: uppercase;
    margin: 22px 0 18px;
  }

  .divider {
    width: 220px;
    height: 1px;
    background: var(--hairline);
    margin: 0 auto;
  }

  .date-block {
    text-align: center;
    padding: 26px 20px 0;
  }

  .date-block .date {
    font-size: clamp(28px, 6.5vw, 40px);
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin: 0 0 4px;
  }

  .date-block .time {
    font-size: clamp(22px, 5.2vw, 30px);
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--red);
    text-transform: uppercase;
  }

  /* Countdown */
  .countdown-section {
    padding: 30px 20px 4px;
    text-align: center;
  }

  .countdown-label {
    font-size: 14px;
    letter-spacing: 0.35em;
    color: var(--tan);
    text-transform: uppercase;
    margin: 0 0 16px;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;
    max-width: 480px;
    margin: 0 auto;
  }

  .countdown .unit {
    flex: 1 1 0;
    max-width: 100px;
    background: linear-gradient(180deg, rgba(94,20,28,0.35), rgba(94,20,28,0.08));
    border: 1px solid var(--maroon-light);
    border-radius: 4px;
    padding: 12px 4px 10px;
  }

  .countdown .num {
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: clamp(28px, 7vw, 40px);
    letter-spacing: 0.02em;
    color: var(--white);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .countdown .lbl {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--tan-dim);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .countdown .colon {
    display: none;
  }

  .live-banner {
    display: none;
    font-family: 'Bebas Neue', 'Oswald', sans-serif;
    font-size: clamp(30px, 8vw, 48px);
    color: var(--red);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(216,60,60,0.5);
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .cta-block {
    text-align: center;
    padding: 40px 24px 0;
  }

  .cta-copy {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.6;
    text-transform: uppercase;
    color: var(--white);
    margin: 0 0 22px;
  }

  .discord-btn {
    display: inline-block;
    padding: 16px 44px;
    background: var(--maroon);
    border: 1px solid var(--maroon-light);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .discord-btn:hover {
    background: var(--maroon-light);
    transform: translateY(-1px);
  }

  .discord-btn:focus-visible {
    outline: 2px solid var(--tan);
    outline-offset: 3px;
  }

  .discord-link {
    display: block;
    margin-top: 18px;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--tan);
    text-decoration: none;
  }

  .discord-link:hover { color: var(--white); }

  @media (max-width: 380px) {
    .countdown { gap: 6px; }
    .countdown .unit { padding: 10px 2px 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-banner { animation: none; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="rule-top"></div>

  <header>
    <p class="eyebrow-title">British Army Combat Group</p>
    <div class="eyebrow-underline"></div>
  </header>

  <div class="badge-wrap">
    <img src="assets/badge.png" alt="B.A.C.G. emblem — skull in helmet crossed with swords over a Union Jack" width="300" height="300">
  </div>

  <div class="headline">
    <p class="tag">PvP</p>
    <h1 class="conflict">CONFLICT</h1>
    <p class="matchup">NATO <span class="vs">vs</span> RUSSIA</p>
    <p class="sub-tag">Server Goes Live</p>
    <div class="divider"></div>
  </div>

  <div class="date-block">
    <p class="date">Friday 24th July</p>
    <p class="time">5:00 PM BST</p>
  </div>

  <div class="divider" style="margin-top:22px;"></div>

  <section class="countdown-section" aria-live="polite">
    <p class="countdown-label" id="countdown-label">Server Live In</p>
    <div class="countdown" id="countdown">
      <div class="unit"><span class="num" id="cd-days">00</span><span class="lbl">Days</span></div>
      <div class="unit"><span class="num" id="cd-hours">00</span><span class="lbl">Hrs</span></div>
      <div class="unit"><span class="num" id="cd-mins">00</span><span class="lbl">Min</span></div>
      <div class="unit"><span class="num" id="cd-secs">00</span><span class="lbl">Sec</span></div>
    </div>
    <p class="live-banner" id="live-banner">SERVER IS LIVE</p>
  </section>

  <div class="cta-block">
    <p class="cta-copy">Join the Discord for full server details<br>and your founding member role</p>
    <a class="discord-btn" href="https://discord.gg/enhCsgR7h" target="_blank" rel="noopener">Join Discord</a>
    <a class="discord-link" href="https://discord.gg/enhCsgR7h" target="_blank" rel="noopener">discord.gg/enhCsgR7h</a>
  </div>

  <div class="rule-bottom"></div>
</div>

<script>
  // Server goes live Friday 24th July 2026, 5:00 PM BST (UTC+1)
  var targetDate = new Date("2026-07-24T17:00:00+01:00").getTime();

  var daysEl = document.getElementById("cd-days");
  var hoursEl = document.getElementById("cd-hours");
  var minsEl = document.getElementById("cd-mins");
  var secsEl = document.getElementById("cd-secs");
  var countdownEl = document.getElementById("countdown");
  var labelEl = document.getElementById("countdown-label");
  var liveEl = document.getElementById("live-banner");

  function pad(n) {
    return String(n).padStart(2, "0");
  }

  function tick() {
    var now = new Date().getTime();
    var diff = targetDate - now;

    if (diff <= 0) {
      countdownEl.style.display = "none";
      labelEl.style.display = "none";
      liveEl.style.display = "block";
      clearInterval(timer);
      return;
    }

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var secs = Math.floor((diff % (1000 * 60)) / 1000);

    daysEl.textContent = pad(days);
    hoursEl.textContent = pad(hours);
    minsEl.textContent = pad(mins);
    secsEl.textContent = pad(secs);
  }

  tick();
  var timer = setInterval(tick, 1000);
</script>

</body>
</html>
