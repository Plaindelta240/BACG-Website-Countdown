<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO vs Russia — Server Launch Countdown | B.A.C.G.</title>
<link rel="icon" type="image/png" href="bacg-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0c10;
    --panel: #14161c;
    --maroon: #6e1f28;
    --maroon-light: #8a2b35;
    --red: #d6423f;
    --cream: #beb59f;
    --white: #f3efe4;
    --line: rgba(190,181,159,0.22);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background: var(--bg);
    background-image: radial-gradient(circle at 50% 0%, rgba(110,31,40,0.28), transparent 55%);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    display:flex;
    justify-content:center;
  }

  .topbar, .bottombar{
    position:fixed;
    left:0; right:0;
    height: 6px;
    background: linear-gradient(to right, var(--maroon), var(--red), var(--maroon));
    z-index: 10;
  }
  .topbar{ top:0; }
  .bottombar{ bottom:0; }

  main{
    width: min(640px, 94vw);
    padding: 34px 0 60px;
    text-align:center;
  }

  .poster-frame{
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow:hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7);
  }

  .poster-frame img{
    display:block;
    width:100%;
    height:auto;
  }

  .seal{
    margin: 30px auto 0;
    width: 104px;
    height: 104px;
  }

  .seal img{
    width:100%;
    height:100%;
    object-fit: contain;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.55));
  }

  .divider{
    display:flex;
    align-items:center;
    gap: 14px;
    margin: 26px 0 36px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--line);
  }
  .divider span{
    font-size: 13px;
    letter-spacing: 0.32em;
    color: var(--cream);
    text-transform: uppercase;
    white-space: nowrap;
  }

  h2{
    font-family: 'Anton', 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(32px, 7.5vw, 48px);
    letter-spacing: 0.02em;
    margin: 0 0 8px;
    color: var(--white);
  }

  .subhead{
    font-size: 15px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 40px;
  }

  .countdown-grid{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap: clamp(4px,1.6vw,14px);
    margin-bottom: 42px;
  }

  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    background: var(--panel);
    border: 1px solid var(--line);
    border-top: 2px solid var(--maroon-light);
    border-radius: 4px;
    padding: 16px clamp(12px,3.4vw,24px) 12px;
    min-width: 76px;
  }

  .unit span{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(34px, 8.5vw, 56px);
    font-weight: 700;
    color: var(--white);
    line-height:1;
  }

  .unit label{
    margin-top: 9px;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--cream);
  }

  .sep{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(26px, 6vw, 40px);
    color: var(--maroon-light);
    padding-bottom: 24px;
    animation: blink 2s steps(1) infinite;
  }

  @keyframes blink{ 50%{ opacity:0.15; } }

  .local-time-block{
    border-top: 1px solid var(--line);
    padding-top: 28px;
  }

  .local-label{
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 12px;
  }

  .local-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(18px, 4vw, 24px);
    color: var(--white);
  }

  .gmt-ref{
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--cream);
    opacity: 0.75;
  }

  .status{
    margin-top: 24px;
    min-height: 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.14em;
    color: var(--red);
    text-transform: uppercase;
  }

  .status.live{
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  .discord-cta{
    margin-top: 48px;
  }

  .discord-cta p{
    font-size: 15px;
    letter-spacing: 0.08em;
    color: var(--cream);
    text-transform: uppercase;
    margin: 0 0 18px;
  }

  .discord-btn{
    display:inline-block;
    background: var(--maroon);
    border: 1px solid var(--maroon-light);
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 19px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 16px 44px;
    border-radius: 3px;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .discord-btn:hover{
    background: var(--maroon-light);
    transform: translateY(-1px);
  }

  .discord-btn:focus-visible{
    outline: 2px solid var(--red);
    outline-offset: 3px;
  }

  .discord-link{
    display:block;
    margin-top: 15px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--cream);
  }

  @media (prefers-reduced-motion: reduce){
    .sep, .status.live{ animation: none; }
  }
</style>
</head>
<body>
  <div class="topbar"></div>
  <div class="bottombar"></div>

  <main>
    <div class="poster-frame">
      <img src="bacg-announcement.png" alt="B.A.C.G. — NATO vs Russia PvP Conflict server launch, Friday 24th July, 5:00 PM BST">
    </div>

    <div class="seal">
      <img src="bacg-logo.png" alt="B.A.C.G. emblem">
    </div>

    <div class="divider"><span>Live Countdown</span></div>

    <h2>Go Live In</h2>
    <div class="subhead">24 Jul 2026 &mdash; 17:00 BST</div>

    <div class="countdown-grid">
      <div class="unit"><span id="days">00</span><label>Days</label></div>
      <div class="sep">:</div>
      <div class="unit"><span id="hours">00</span><label>Hrs</label></div>
      <div class="sep">:</div>
      <div class="unit"><span id="mins">00</span><label>Min</label></div>
      <div class="sep">:</div>
      <div class="unit"><span id="secs">00</span><label>Sec</label></div>
    </div>

    <div class="local-time-block">
      <div class="local-label">Go live in your local time</div>
      <div class="local-time" id="localTime">&mdash;</div>
      <div class="gmt-ref">When: 24 July 2026, 17:00 BST (16:00 UTC)</div>
    </div>

    <div class="status" id="status"></div>

    <div class="discord-cta">
      <p>Join the Discord for full server details<br>and your founding member role</p>
      <a class="discord-btn" href="https://discord.gg/enhCsgR7h" target="_blank" rel="noopener">Join Discord</a>
      <span class="discord-link">discord.gg/enhCsgR7h</span>
    </div>
  </main>

<script>
  // Go-live is fixed at 24 July 2026, 17:00 BST — which is 16:00 UTC.
  // Expressed in UTC below so it resolves correctly to each viewer's
  // own local clock regardless of their timezone.
  // Month is 0-indexed in JS Date: 6 = July.
  function getTargetDate(){
    return new Date(Date.UTC(2026, 6, 24, 16, 0, 0));
  }

  const target = getTargetDate();
  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minsEl = document.getElementById('mins');
  const secsEl = document.getElementById('secs');
  const statusEl = document.getElementById('status');
  const localTimeEl = document.getElementById('localTime');

  localTimeEl.textContent = target.toLocaleString(undefined, {
    weekday: 'short',
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    timeZoneName: 'short'
  });

  function pad(n){ return String(n).padStart(2,'0'); }

  let timer;
  function tick(){
    const diff = target - new Date();

    if (diff <= 0){
      daysEl.textContent = '00';
      hoursEl.textContent = '00';
      minsEl.textContent = '00';
      secsEl.textContent = '00';
      statusEl.textContent = 'Server is live';
      statusEl.classList.add('live');
      clearInterval(timer);
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff / 3600000) % 24);
    const mins = Math.floor((diff / 60000) % 60);
    const secs = Math.floor((diff / 1000) % 60);

    daysEl.textContent = pad(days);
    hoursEl.textContent = pad(hours);
    minsEl.textContent = pad(mins);
    secsEl.textContent = pad(secs);
  }

  tick();
  timer = setInterval(tick, 1000);
</script>
</body>
</html>
